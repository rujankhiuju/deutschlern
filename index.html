<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeutschLern — German Flashcards</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;user-select:none}
:root{
  --bg:#0d0d1a;--surface:#16162b;--surface2:#1e1e38;--surface3:#2a2a4a;
  --text:#e8e8f0;--text-muted:#8888aa;--border:#2a2a4a;
  --green:#4ade80;--blue:#60a5fa;--purple:#c084fc;--orange:#fb923c;
  --red:#f87171;--yellow:#fbbf24;--pink:#f472b6;--cyan:#22d3ee;
  --radius:16px;--shadow:0 8px 32px rgba(0,0,0,.5);
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
body{display:flex;align-items:center;justify-content:center}
.app{display:flex;width:100vw;height:100vh;max-width:1200px;margin:0 auto;padding:16px;gap:16px}
.sidebar{width:230px;min-width:230px;background:var(--surface);border-radius:var(--radius);padding:20px 16px;display:flex;flex-direction:column;gap:2px;border:1px solid var(--border);overflow-y:auto}
.logo{font-size:18px;font-weight:800;letter-spacing:-.5px;margin-bottom:8px;background:linear-gradient(135deg,var(--green),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo span{-webkit-text-fill-color:var(--text-muted);font-weight:400;font-size:12px;display:block;margin-top:1px}
.nav-group{display:flex;flex-direction:column;gap:1px}
.nav-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);padding:5px 10px 1px;margin-top:1px}
.level-row{display:flex;gap:2px;padding:0 6px 6px;border-bottom:1px solid var(--border);margin-bottom:2px}
.lvl-btn{padding:4px 8px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-size:10px;font-weight:600;cursor:pointer;transition:all .2s;flex:1;text-align:center;line-height:1.3}
.lvl-btn:hover{background:var(--surface2);color:var(--text)}
.lvl-btn.active{background:var(--surface2);color:var(--text);border-color:var(--text-muted)}
.lvl-btn[data-level="a1"].active{border-color:var(--green);color:var(--green)}
.lvl-btn[data-level="a2"].active{border-color:var(--blue);color:var(--blue)}
.lvl-btn[data-level="b1"].active{border-color:var(--orange);color:var(--orange)}
.lvl-btn[data-level="b2"].active{border-color:var(--red);color:var(--red)}
.nav-btn{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:6px;border:none;background:transparent;color:var(--text-muted);font-size:12px;font-weight:500;cursor:pointer;transition:all .12s;width:100%;text-align:left}
.nav-btn:hover{background:var(--surface2);color:var(--text)}
.nav-btn.active{background:var(--surface2);color:var(--text)}
.nav-btn .count{margin-left:auto;font-size:9px;color:var(--text-muted);background:var(--surface3);padding:1px 5px;border-radius:3px;font-weight:600}
.nav-btn.active .count{color:var(--text)}
.nav-btn .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot-green{background:var(--green)}.dot-blue{background:var(--blue)}.dot-purple{background:var(--purple)}.dot-orange{background:var(--orange)}
.dot-yellow{background:var(--yellow)}.dot-pink{background:var(--pink)}.dot-cyan{background:var(--cyan)}.dot-red{background:var(--red)}
.sidebar-divider{height:1px;background:var(--border);margin:2px 8px}
.sidebar-stats{padding-top:6px;border-top:1px solid var(--border);margin-top:auto}
.stat-row{display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);padding:2px 0}
.stat-row .num{color:var(--text);font-weight:600}
.stat-row .num.gold{color:var(--yellow)}
.toggle-row{display:flex;align-items:center;gap:6px;padding:4px 8px;margin-bottom:2px;cursor:pointer;border-radius:6px;transition:background .15s}
.toggle-row:hover{background:var(--surface2)}
.toggle-switch{width:32px;height:18px;border-radius:10px;background:var(--surface3);position:relative;transition:background .2s;flex-shrink:0}
.toggle-switch.active{background:var(--yellow)}
.toggle-switch::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:var(--text);top:2px;left:2px;transition:transform .2s}
.toggle-switch.active::after{transform:translateX(14px);background:#0d0d1a}
.toggle-label{font-size:11px;font-weight:600;color:var(--text-muted)}
.toggle-label.active{color:var(--yellow)}
.toggle-badge{font-size:8px;padding:1px 5px;border-radius:3px;background:var(--yellow);color:#0d0d1a;font-weight:700;display:none}
.toggle-badge.show{display:inline}
.filter-display{display:flex;gap:5px;justify-content:center;align-items:center;flex-wrap:wrap}
.filter-badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:5px;background:var(--surface2);color:var(--text-muted);border:1px solid var(--border)}
.filter-badge.level{color:var(--text)}
.filter-badge.level-a1{border-color:var(--green);color:var(--green)}
.filter-badge.level-a2{border-color:var(--blue);color:var(--blue)}
.filter-badge.level-b1{border-color:var(--orange);color:var(--orange)}
.filter-badge.level-b2{border-color:var(--red);color:var(--red)}
.filter-badge.exam{border-color:var(--yellow);color:var(--yellow)}
.card-counter{font-size:12px;color:var(--text-muted);font-weight:500}
.card-counter .current{color:var(--text);font-size:15px;font-weight:700}
.card-wrapper{width:100%;max-width:520px;aspect-ratio:4/3;perspective:1200px;cursor:pointer}
.card{width:100%;height:100%;position:relative;transition:transform .5s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d}
.card.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:var(--radius);background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;overflow:hidden}
.card-face::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.card-face.noun::before{background:var(--green)}
.card-face.verb::before{background:var(--blue)}
.card-face.phrase::before{background:var(--purple)}
.card-face.adverb::before{background:var(--yellow)}
.card-face.question::before{background:var(--pink)}
.card-face.case::before{background:var(--cyan)}
.card-face.grammar::before{background:var(--red)}
.card-back{transform:rotateY(180deg)}
.card-badges{position:absolute;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;pointer-events:none;gap:4px;flex-wrap:wrap}
.card-type-badge,.card-level-badge,.card-exam-badge{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:2px 6px;border-radius:4px;background:var(--surface3);color:var(--text-muted);white-space:nowrap}
.card-level-badge.lvl-a1{background:rgba(74,222,128,.2);color:var(--green)}
.card-level-badge.lvl-a2{background:rgba(96,165,250,.2);color:var(--blue)}
.card-level-badge.lvl-b1{background:rgba(251,146,60,.2);color:var(--orange)}
.card-level-badge.lvl-b2{background:rgba(248,113,113,.2);color:var(--red)}
.card-exam-badge{background:rgba(251,191,36,.25);color:var(--yellow);display:none}
.card-emoji{font-size:clamp(36px,6vw,64px);line-height:1;margin-bottom:6px}
.card-german{font-size:clamp(24px,4vw,44px);font-weight:800;text-align:center;line-height:1.2;word-break:break-word}
.card-article{font-size:14px;font-weight:600;margin-bottom:4px;padding:2px 8px;border-radius:5px;display:inline-block}
.card-article.der{color:var(--blue);background:rgba(96,165,250,.15)}
.card-article.die{color:var(--purple);background:rgba(192,132,252,.15)}
.card-article.das{color:var(--green);background:rgba(74,222,128,.15)}
.card-hint{position:absolute;bottom:12px;font-size:10px;color:var(--text-muted);opacity:.4;transition:opacity .2s}
.card:hover .card-hint{opacity:.7}
.card-english{font-size:clamp(18px,2.5vw,30px);font-weight:700;text-align:center;line-height:1.3;color:var(--text)}
.card-extra{font-size:13px;color:var(--text-muted);text-align:center;margin-top:10px;line-height:1.5;max-width:360px}
.card-extra strong{color:var(--text)}
.card-extra .example{color:var(--text-muted);font-style:italic;margin-top:3px;font-size:12px}
.controls{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.ctrl-btn{padding:8px 18px;border-radius:9px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:all .12s;font-family:inherit}
.ctrl-btn:active{transform:scale(.93)}
.ctrl-btn-again{background:#3b1f1f;color:#f87171}
.ctrl-btn-again:hover{background:#4f2a2a}
.ctrl-btn-good{background:#1f3b2a;color:#4ade80}
.ctrl-btn-good:hover{background:#2a4f38}
.ctrl-btn-easy{background:#1f2a3b;color:#60a5fa}
.ctrl-btn-easy:hover{background:#2a384f}
.ctrl-btn-nav{background:var(--surface2);color:var(--text);padding:8px 14px}
.ctrl-btn-nav:hover{background:var(--surface3)}
.ctrl-btn-shuffle{background:var(--surface2);color:var(--text-muted);padding:8px 12px;font-size:14px}
.ctrl-btn-shuffle:hover{background:var(--surface3);color:var(--text)}
.progress-wrap{width:100%;max-width:520px;height:3px;background:var(--surface2);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .4s ease,background .4s;width:0%}
.empty-state{text-align:center;padding:28px}
.empty-state .icon{font-size:38px;margin-bottom:10px}
.empty-state h3{font-size:16px;font-weight:700;margin-bottom:4px}
.empty-state p{color:var(--text-muted);font-size:12px}
@keyframes cardOut{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(.9) translateY(-20px)}}
@keyframes cardIn{0%{opacity:0;transform:scale(1.1) translateY(20px)}100%{opacity:1;transform:scale(1) translateY(0)}}
.card-wrapper.anim-out .card{animation:cardOut .18s ease forwards}
.card-wrapper.anim-in .card{animation:cardIn .18s ease forwards}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-track{background:transparent}
.sidebar::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px}
.key-hint{font-size:10px;color:var(--text-muted);opacity:.3;text-align:center;margin-top:-4px}
@media(max-width:860px){
  .app{padding:8px;gap:8px}.sidebar{width:200px;min-width:200px;padding:14px 10px}.nav-btn{font-size:11px;padding:5px 7px}
}
@media(max-width:700px){
  .app{flex-direction:column;padding:5px;gap:5px}
  .sidebar{width:100%;min-width:auto;flex-direction:row;padding:8px 10px;gap:2px;overflow-x:auto;flex-shrink:0;border-radius:10px;align-items:center;flex-wrap:wrap}
  .logo,.sidebar-divider,.sidebar-stats{display:none}
  .level-row{border-bottom:none;padding:0;margin:0}
  .lvl-btn{padding:2px 6px;font-size:9px}
  .nav-group{flex-direction:row;gap:2px;margin:0}
  .nav-label{display:none}
  .nav-btn{padding:4px 6px;white-space:nowrap;font-size:10px;justify-content:center}
  .nav-btn .count{display:none}
  .toggle-row{display:none}
  .main{padding:6px;gap:10px}
  .ctrl-btn{padding:6px 12px;font-size:11px}
}
@media(max-width:480px){
  .card-face{padding:16px}.ctrl-btn{padding:5px 10px;font-size:10px}
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="logo">DeutschLern<span>German Flashcards</span></div>

    <div class="level-row">
      <button class="lvl-btn active" data-level="all">All</button>
      <button class="lvl-btn" data-level="a1">A1</button>
      <button class="lvl-btn" data-level="a2">A2</button>
      <button class="lvl-btn" data-level="b1">B1</button>
      <button class="lvl-btn" data-level="b2">B2</button>
    </div>

    <div class="toggle-row" id="exam-toggle">
      <div class="toggle-switch" id="exam-switch"></div>
      <span class="toggle-label" id="exam-label">Pr&uuml;fungsrelevant</span>
      <span class="toggle-badge" id="exam-badge">EXAM</span>
    </div>

    <div class="nav-group">
      <div class="nav-label">Vocabulary</div>
      <button class="nav-btn active" data-cat="all"><span class="dot" style="background:var(--text-muted)"></span>All<span class="count" id="count-all">0</span></button>
      <button class="nav-btn" data-cat="nouns"><span class="dot dot-green"></span>Nouns<span class="count" id="count-nouns">0</span></button>
      <button class="nav-btn" data-cat="verbs"><span class="dot dot-blue"></span>Verbs<span class="count" id="count-verbs">0</span></button>
      <button class="nav-btn" data-cat="adverb"><span class="dot dot-yellow"></span>Adverbs<span class="count" id="count-adverb">0</span></button>
    </div>

    <div class="sidebar-divider"></div>

    <div class="nav-group">
      <div class="nav-label">Language</div>
      <button class="nav-btn" data-cat="question"><span class="dot dot-pink"></span>Questions<span class="count" id="count-question">0</span></button>
      <button class="nav-btn" data-cat="case"><span class="dot dot-cyan"></span>Cases<span class="count" id="count-case">0</span></button>
      <button class="nav-btn" data-cat="grammar"><span class="dot dot-red"></span>Grammar<span class="count" id="count-grammar">0</span></button>
      <button class="nav-btn" data-cat="phrases"><span class="dot dot-purple"></span>Phrases<span class="count" id="count-phrases">0</span></button>
    </div>

    <div class="sidebar-divider"></div>

    <div class="sidebar-stats">
      <div class="stat-row"><span>W&ouml;rter gelernt</span><span class="num gold" id="stat-learned">0</span></div>
      <div class="stat-row"><span>Studied (session)</span><span class="num" id="stat-studied">0</span></div>
      <div class="stat-row"><span>Remaining</span><span class="num" id="stat-remaining">0</span></div>
      <div class="stat-row"><span>Progress</span><span class="num" id="stat-pct">0%</span></div>
    </div>
  </aside>

  <main class="main">
    <div class="filter-display" id="filter-display">
      <span class="filter-badge level" id="badge-level">ALL LEVELS</span>
      <span class="filter-badge" id="badge-category">ALL</span>
      <span class="filter-badge exam" id="badge-exam" style="display:none">EXAM</span>
    </div>
    <div class="card-counter"><span class="current" id="card-current">1</span> / <span id="card-total">1</span></div>

    <div class="card-wrapper" id="card-wrapper">
      <div class="card" id="card">
        <div class="card-face noun" id="face-front">
          <div class="card-badges">
            <span class="card-level-badge lvl-a1" id="badge-level-front">A1</span>
            <span class="card-exam-badge" id="badge-exam-front">EXAM</span>
            <span class="card-type-badge" id="badge-type-front">NOUN</span>
          </div>
          <div class="card-emoji" id="card-emoji">&#x1FA91;</div>
          <div class="card-article der" id="card-article"></div>
          <div class="card-german" id="card-german">der Tisch</div>
          <div class="card-hint">click or press Space to flip</div>
        </div>
        <div class="card-face card-back noun" id="face-back">
          <div class="card-badges">
            <span class="card-level-badge lvl-a1" id="badge-level-back">A1</span>
            <span class="card-exam-badge" id="badge-exam-back">EXAM</span>
            <span class="card-type-badge" id="badge-type-back">NOUN</span>
          </div>
          <div class="card-emoji" id="card-emoji-back">&#x1FA91;</div>
          <div class="card-english" id="card-english">table</div>
          <div class="card-extra" id="card-extra"><strong>Plural:</strong> die Tische</div>
        </div>
      </div>
    </div>

    <div class="controls" id="controls">
      <button class="ctrl-btn ctrl-btn-again" id="btn-again">Again</button>
      <button class="ctrl-btn ctrl-btn-good" id="btn-good">Good</button>
      <button class="ctrl-btn ctrl-btn-easy" id="btn-easy">Easy</button>
      <button class="ctrl-btn ctrl-btn-nav" id="btn-prev">&larr;</button>
      <button class="ctrl-btn ctrl-btn-nav" id="btn-next">&rarr;</button>
      <button class="ctrl-btn ctrl-btn-shuffle" id="btn-shuffle">&olarr;</button>
    </div>

    <div class="progress-wrap"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="key-hint">Space: flip &middot; &larr; &rarr;: nav &middot; 1:Again 2:Good 3:Easy</div>
  </main>
</div>

<script>
(function() {
"use strict";

// ── Persistence ──
function loadProgress() {
  try {
    var raw = localStorage.getItem('deutschlern_data');
    if (!raw) return { studied: [], totalLearned: 0 };
    var data = JSON.parse(raw);
    return {
      studied: Array.isArray(data.studied) ? data.studied : [],
      totalLearned: typeof data.totalLearned === 'number' ? data.totalLearned : 0
    };
  } catch(e) {
    return { studied: [], totalLearned: 0 };
  }
}

function saveProgress(studiedArr, total) {
  try {
    localStorage.setItem('deutschlern_data', JSON.stringify({
      studied: studiedArr,
      totalLearned: total
    }));
  } catch(e) {}
}

var saved = loadProgress();

// ── State ──
var state = {
  level: 'all',
  category: 'all',
  index: 0,
  flipped: false,
  examOnly: false,
  studied: new Set(saved.studied),
  totalLearned: saved.totalLearned,
  deck: []
};

// ── Data ──
var CARDS = [
  // A1 NOUNS
  { id:'n1', level:'a1', type:'noun', german:'der Tisch', english:'table', article:'der', plural:'die Tische', emoji:'table' },
  { id:'n2', level:'a1', type:'noun', german:'die Schule', english:'school', article:'die', plural:'die Schulen', emoji:'school' },
  { id:'n3', level:'a1', type:'noun', german:'das Buch', english:'book', article:'das', plural:'die Bucher', emoji:'book' },
  { id:'n4', level:'a1', type:'noun', german:'der Freund', english:'friend', article:'der', plural:'die Freunde', emoji:'friend' },
  { id:'n5', level:'a1', type:'noun', german:'die Familie', english:'family', article:'die', plural:'die Familien', emoji:'family' },
  { id:'n6', level:'a1', type:'noun', german:'das Haus', english:'house', article:'das', plural:'die Hauser', emoji:'house' },
  { id:'n7', level:'a1', type:'noun', german:'der Mann', english:'man', article:'der', plural:'die Manner', emoji:'man' },
  { id:'n8', level:'a1', type:'noun', german:'die Frau', english:'woman', article:'die', plural:'die Frauen', emoji:'woman' },
  { id:'n9', level:'a1', type:'noun', german:'das Kind', english:'child', article:'das', plural:'die Kinder', emoji:'child' },
  { id:'n10', level:'a1', type:'noun', german:'der Hund', english:'dog', article:'der', plural:'die Hunde', emoji:'dog' },
  { id:'n11', level:'a1', type:'noun', german:'der Stuhl', english:'chair', article:'der', plural:'die Stuhle', emoji:'chair' },
  { id:'n12', level:'a1', type:'noun', german:'das Bett', english:'bed', article:'das', plural:'die Betten', emoji:'bed' },
  { id:'n13', level:'a1', type:'noun', german:'die Kuche', english:'kitchen', article:'die', plural:'die Kuchen', emoji:'kitchen' },
  { id:'n14', level:'a1', type:'noun', german:'das Bad', english:'bathroom', article:'das', plural:'die Bader', emoji:'bath' },
  { id:'n15', level:'a1', type:'noun', german:'das Brot', english:'bread', article:'das', plural:'die Brote', emoji:'bread' },
  { id:'n16', level:'a1', type:'noun', german:'die Milch', english:'milk', article:'die', plural:'-', emoji:'milk' },
  { id:'n17', level:'a1', type:'noun', german:'der Kaffee', english:'coffee', article:'der', plural:'-', emoji:'coffee' },
  { id:'n18', level:'a1', type:'noun', german:'der Kopf', english:'head', article:'der', plural:'die Kopfe', emoji:'head' },
  { id:'n19', level:'a1', type:'noun', german:'die Hand', english:'hand', article:'die', plural:'die Hande', emoji:'hand' },
  { id:'n20', level:'a1', type:'noun', german:'das Auge', english:'eye', article:'das', plural:'die Augen', emoji:'eye' },
  { id:'n21', level:'a1', type:'noun', german:'der Fuß', english:'foot', article:'der', plural:'die Fuße', emoji:'foot' },
  { id:'n22', level:'a1', type:'noun', german:'das Hemd', english:'shirt', article:'das', plural:'die Hemden', emoji:'shirt' },
  { id:'n23', level:'a1', type:'noun', german:'die Hose', english:'pants', article:'die', plural:'die Hosen', emoji:'pants' },

  { id:'n26', level:'a1', type:'noun', german:'die Farbe', english:'color', article:'die', plural:'die Farben', emoji:'color' },
  { id:'n27', level:'a1', type:'noun', german:'die Stadt', english:'city', article:'die', plural:'die Stadte', emoji:'city' },
  { id:'n28', level:'a1', type:'noun', german:'der Zug', english:'train', article:'der', plural:'die Zuge', emoji:'train' },

// ── Core Functions ──
function getDeck() {
  var cards = CARDS.slice();
  if (state.level !== 'all') cards = cards.filter(function(c) { return c.level === state.level; });
  if (state.category !== 'all') cards = cards.filter(function(c) { return c.type === state.category; });
  if (state.examOnly) cards = cards.filter(function(c) { return c.exam === true; });
  return cards;
}

function shuffleArray(arr) {
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  return arr;
}

function rebuildDeck() {
  state.index = 0;
  state.flipped = false;
  cardEl.classList.remove('flipped');
  state.deck = getDeck();
  shuffleArray(state.deck);
}

function getEmoji(name) { return EMOJI_MAP[name] || '✨'; }

function renderCard(animate) {
  if (animate === undefined) animate = true;
  var deck = state.deck;
  if (!deck.length) {
    wrapperEl.innerHTML = '<div class="empty-state"><div class="icon">🎯</div><h3>Keine Karten</h3><p>Try a different filter.</p></div>';
    $('controls').style.display = 'none';
    $('progress-fill').style.width = '100%';
    $('card-current').textContent = '0';
    $('card-total').textContent = '0';
    updateSidebar();
    return;
  }
  $('controls').style.display = 'flex';
  var c = deck[state.index];
  if (!c) { state.index = 0; renderCard(false); return; }

  if (animate) {
    wrapperEl.classList.add('anim-out');
    setTimeout(function() {
      renderCardContent(c);
      wrapperEl.classList.remove('anim-out');
      wrapperEl.classList.add('anim-in');
      setTimeout(function() { wrapperEl.classList.remove('anim-in'); }, 220);
    }, 160);
  } else {
    renderCardContent(c);
  }

  state.flipped = false;
  cardEl.classList.remove('flipped');
  $('card-current').textContent = state.index + 1;
  $('card-total').textContent = deck.length;
  updateFilters();
  updateSidebar();
  updateProgress();
}

function renderCardContent(c) {
  var t = c.type;
  frontEl.className = 'card-face ' + t;
  backEl.className = 'card-face card-back ' + t;

  var badgeNames = { noun:'NOUN', verb:'VERB', adverb:'ADVERB', question:'QUESTION', case:'CASE', grammar:'GRAMMAR', phrase:'PHRASE' };
  var label = badgeNames[t] || t.toUpperCase();
  $('badge-type-front').textContent = label;
  $('badge-type-back').textContent = label;

  var lvlUpper = c.level.toUpperCase();
  $('badge-level-front').textContent = lvlUpper;
  $('badge-level-front').className = 'card-level-badge lvl-' + c.level;
  $('badge-level-back').textContent = lvlUpper;
  $('badge-level-back').className = 'card-level-badge lvl-' + c.level;

  var emoji = getEmoji(c.emoji);
  $('card-emoji').textContent = emoji;
  $('card-emoji-back').textContent = emoji;

  var examFront = $('badge-exam-front');
  var examBack = $('badge-exam-back');
  if (c.exam) {
    examFront.style.display = 'inline';
    examBack.style.display = 'inline';
  } else {
    examFront.style.display = 'none';
    examBack.style.display = 'none';
  }

  $('card-german').textContent = c.german;

  var ae = $('card-article');
  if (t === 'noun') {
    ae.textContent = c.article;
    ae.className = 'card-article ' + c.article;
    ae.style.display = 'inline-block';
  } else {
    ae.style.display = 'none';
  }

  $('card-english').textContent = c.english;

  var extra = $('card-extra');
  if (t === 'noun') {
    extra.innerHTML = '<strong>Plural:</strong> ' + c.plural;
    extra.style.display = 'block';
  } else if (t === 'verb') {
    extra.innerHTML = '<strong>Conjugation:</strong> ' + c.pattern;
    extra.style.display = 'block';
  } else {
    extra.style.display = 'none';
  }
}

function flipCard() {
  if (!state.deck.length) return;
  state.flipped = !state.flipped;
  cardEl.classList.toggle('flipped');
}

function goNext() {
  if (state.deck.length && state.index < state.deck.length - 1) {
    state.index++;
    renderCard(true);
  }
}

function goPrev() {
  if (state.deck.length && state.index > 0) {
    state.index--;
    renderCard(true);
  }
}

function rateCard(rating) {
  if (!state.deck.length) return;
  if (!state.flipped) { flipCard(); return; }
  var c = state.deck[state.index];
  if (!state.studied.has(c.id)) {
    state.studied.add(c.id);
    state.totalLearned = Math.max(state.totalLearned, state.studied.size);
    saveProgress(Array.from(state.studied), state.totalLearned);
  }
  if (rating === 'again') {
    flipCard();
    setTimeout(function() { flipCard(); }, 600);
    return;
  }
  if (state.index < state.deck.length - 1) {
    state.index++;
    renderCard(true);
  } else {
    renderCard(true);
  }
}

// ── UI Functions ──
function switchLevel(level) {
  state.level = level;
  var btns = document.querySelectorAll('.lvl-btn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.toggle('active', btns[i].getAttribute('data-level') === level);
  }
  rebuildDeck();
  renderCard(false);
}

function switchCategory(cat) {
  state.category = cat;
  var btns = document.querySelectorAll('.nav-btn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.toggle('active', btns[i].getAttribute('data-cat') === cat);
  }
  rebuildDeck();
  renderCard(false);
}

function toggleExam() {
  state.examOnly = !state.examOnly;
  rebuildDeck();
  renderCard(false);
  updateExamUI();
}

function updateExamUI() {
  var sw = $('exam-switch');
  var lb = $('exam-label');
  var bg = $('exam-badge');
  sw.className = 'toggle-switch' + (state.examOnly ? ' active' : '');
  lb.className = 'toggle-label' + (state.examOnly ? ' active' : '');
  bg.className = 'toggle-badge' + (state.examOnly ? ' show' : '');
}

function shuffleDeck() {
  shuffleArray(state.deck);
  state.index = 0;
  state.flipped = false;
  cardEl.classList.remove('flipped');
  renderCard(true);
}

function updateFilters() {
  var levelText = state.level === 'all' ? 'ALL LEVELS' : state.level.toUpperCase();
  var b = $('badge-level');
  b.textContent = levelText;
  b.className = 'filter-badge level';
  if (state.level !== 'all') b.classList.add('level-' + state.level);
  $('badge-category').textContent = state.category === 'all' ? 'ALL' : state.category.toUpperCase();
  var examB = $('badge-exam');
  examB.style.display = state.examOnly ? 'inline' : 'none';
}

function updateProgress() {
  var total = state.deck.length;
  var studiedCount = 0;
  var studiedArr = Array.from(state.studied);
  for (var i = 0; i < studiedArr.length; i++) {
    if (state.deck.some(function(c) { return c.id === studiedArr[i]; })) studiedCount++;
  }
  var pct = total > 0 ? (studiedCount / total) * 100 : 0;
  var p = $('progress-fill');
  p.style.width = pct + '%';
  p.style.background = pct < 33 ? '#f87171' : pct < 66 ? '#fb923c' : '#4ade80';
}

function getFilteredCount(cat) {
  var c = CARDS.slice();
  if (state.level !== 'all') c = c.filter(function(x) { return x.level === state.level; });
  if (cat) c = c.filter(function(x) { return x.type === cat; });
  if (state.examOnly) c = c.filter(function(x) { return x.exam === true; });
  return c.length;
}

function updateSidebar() {
  var deck = state.deck;
  var total = deck.length;
  var studiedCount = 0;
  var studiedArr = Array.from(state.studied);
  for (var i = 0; i < studiedArr.length; i++) {
    if (deck.some(function(c) { return c.id === studiedArr[i]; })) studiedCount++;
  }
  var pct = total > 0 ? Math.round((studiedCount / total) * 100) : 0;
  $('stat-learned').textContent = state.totalLearned;
  $('stat-studied').textContent = studiedCount;
  $('stat-remaining').textContent = total - studiedCount;
  $('stat-pct').textContent = pct + '%';

  $('count-all').textContent = getFilteredCount();
  $('count-nouns').textContent = getFilteredCount('nouns');
  $('count-verbs').textContent = getFilteredCount('verbs');
  $('count-adverb').textContent = getFilteredCount('adverb');
  $('count-question').textContent = getFilteredCount('question');
  $('count-case').textContent = getFilteredCount('case');
  $('count-grammar').textContent = getFilteredCount('grammar');
  $('count-phrases').textContent = getFilteredCount('phrases');
}

// ── Event Setup ──
function setupEvents() {
  var lvlBtns = document.querySelectorAll('.lvl-btn');
  for (var i = 0; i < lvlBtns.length; i++) {
    (function(btn) {
      btn.addEventListener('click', function() { switchLevel(btn.getAttribute('data-level')); });
    })(lvlBtns[i]);
  }

  var navBtns = document.querySelectorAll('.nav-btn');
  for (var j = 0; j < navBtns.length; j++) {
    (function(btn) {
      btn.addEventListener('click', function() { switchCategory(btn.getAttribute('data-cat')); });
    })(navBtns[j]);
  }

  $('exam-toggle').addEventListener('click', toggleExam);

  wrapperEl.addEventListener('click', function(e) {
    if (!e.target.closest('.ctrl-btn')) flipCard();
  });

  $('btn-again').addEventListener('click', function() { rateCard('again'); });
  $('btn-good').addEventListener('click', function() { rateCard('good'); });
  $('btn-easy').addEventListener('click', function() { rateCard('easy'); });
  $('btn-prev').addEventListener('click', goPrev);
  $('btn-next').addEventListener('click', goNext);
  $('btn-shuffle').addEventListener('click', shuffleDeck);

  document.addEventListener('keydown', function(e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    switch (e.key) {
      case ' ': e.preventDefault(); flipCard(); break;
      case 'ArrowLeft': e.preventDefault(); goPrev(); break;
      case 'ArrowRight': e.preventDefault(); goNext(); break;
      case '1': rateCard('again'); break;
      case '2': rateCard('good'); break;
      case '3': rateCard('easy'); break;
    }
  });
}

// ── Init ──
setupEvents();
rebuildDeck();
renderCard(false);
updateExamUI();

})();
</script>
</body>
</html>
